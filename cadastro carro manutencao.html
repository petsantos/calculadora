
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto center Pet</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }

        h1, h2 {
            color: #333;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .form-group label {
            width: 80px;
            font-weight: bold;
            color: #555;
        }

        .form-group label.required::before {
            content: "* ";
            color: red;
        }

        .form-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Botões */
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 25px 0;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-cadastrar { background-color: #28a745; color: white; }
        .btn-editar { background-color: #ffc107; color: #333; }
        .btn-remover { background-color: #dc3545; color: white; }

        button:hover { opacity: 0.8; }

        /* Tabela */
        .table-section {
            margin-top: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #333;
        }

        tr:nth-child(even) { background-color: #fcfcfc; }
    </style>
</head>
<body>

<div class="container">
    <h1>Auto Center Pet</h1>
    
    <form id="veiculoForm">
        <div class="form-group">
            <label for="id">Id:</label>
            <input type="text" id="id" placeholder="Automático">
        </div>
        
        <div class="form-group">
            <label for="placa">Placa:</label>
            <input type="text" id="placa">
        </div>
        <div class="form-group">
            <label for="Odometro" class="required">Odometro:</label>
            <input type="text" id="Odometro" required>
        </div>
        <div class="form-group">
            <label for="Cor" class="required">Cor:</label>
            <input type="text" id="Cor" required>
        </div>
        <div class="form-group">
            <label for="marca" class="required">Marca:</label>
            <input type="text" id="marca" required>
        </div>
        
        <div class="form-group">
            <label for="modelo" class="required">Modelo:</label>
            <input type="text" id="modelo" required>
        </div>
        
        <div class="form-group">
            <label for="ano" class="required">Ano:</label>
            <input type="number" id="ano" required>
        </div>

        <div class="actions">
            <button type="submit" class="btn-cadastrar">Cadastrar</button>
            <button type="button" class="btn-editar">Editar</button>
            <button type="button" class="btn-remover">Remover</button>
        </div>
    </form>

    <div class="table-section">
        <h2>Veículos Cadastrados Para Manutenção</h2>
        <table>
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Placa</th>
                    <th>Odometro</th>
                    <th>Cor</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Ano</th>
                </tr>
            </thead>
            <tbody id="listaVeiculos">
                <!-- Exemplo de linha -->
                <tr>
                    <td>1</td>
                    <td>ABC-1234</td>
                    <td>202.000</td>
                    <td>Prata</td>
                    <td>Chevrolet</td>
                    <td>Astra</td>
                    <td>2002</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
